<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SERVIFIX.AR - Oficial</title>
  <meta name="theme-color" content="#020817" />
  <style>
    :root {
      --bg: #020817; --bg2: #06111f; --panel: #071224; --text: #f8fafc;
      --muted: #94a3b8; --green: #00f5b0; --green2: #00d084; --danger: #ef4444;
      --violet: #7c3aed; --line: rgba(255,255,255,.10); --navH: 76px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
    .app, .loginWrap { max-width: 520px; margin: 0 auto; min-height: 100vh; position: relative; background: linear-gradient(180deg, #020817 0%, #06111f 100%); }
    .hidden { display: none !important; }
    
    /* LOGIN & BRAND */
    .heroPanel { border: 1px solid rgba(0, 245, 176, 0.2); border-radius: 34px; padding: 40px 20px; text-align: center; margin: 20px; background: rgba(7, 18, 36, 0.4); }
    .sfIcon.big { width: 100px; height: 100px; border: 2px solid var(--green); border-radius: 30px; margin: 0 auto; display: grid; place-items: center; font-size: 3rem; font-weight: 900; box-shadow: 0 0 20px rgba(0, 245, 176, 0.2); }
    .brandText { font-size: 2.8rem; font-weight: 1000; margin: 20px 0; letter-spacing: -2px; }
    .brandText span { color: var(--green); }
    
    /* UI COMPONENTS */
    .btn { width: 100%; padding: 16px; border-radius: 18px; border: none; background: linear-gradient(135deg, var(--green2), var(--green)); color: #001018; font-weight: 800; font-size: 1rem; cursor: pointer; transition: transform 0.2s; }
    .btn:active { transform: scale(0.98); }
    .card { background: rgba(255,255,255,0.03); border: 1px solid var(--line); border-radius: 24px; padding: 20px; margin-bottom: 15px; }
    
    /* NAVIGATION */
    .top { padding: 15px 20px; background: rgba(2, 8, 23, 0.8); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    .screen { padding: 20px; display: none; padding-bottom: 100px; }
    .screen.active { display: block; animation: fadeIn 0.3s ease; }
    .bottomNav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 520px; height: var(--navH); background: rgba(2, 8, 23, 0.95); display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1px solid var(--line); backdrop-filter: blur(10px); }
    .navBtn { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.65rem; color: #64748b; font-weight: 700; border: none; background: none; }
    .navBtn.active { color: var(--green); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<section id="loginScreen" class="loginWrap">
  <div style="padding-top: 60px;">
    <div class="heroPanel">
      <div class="sfIcon big">SF</div>
      <div class="brandText">SERVI<span>FIX</span></div>
      <p style="color: var(--muted); margin-bottom: 30px;">Busca. Contrata. Listo.</p>
      <button class="btn" id="btnGoogle">Continuar con Google</button>
    </div>
  </div>
</section>

<main id="mainApp" class="app hidden">
  <header class="top">
    <span style="font-weight: 900; letter-spacing: 1px;">SERVI<span style="color:var(--green)">FIX</span></span>
    <div id="userIn" style="width: 32px; height: 32px; background: var(--green); border-radius: 10px; color: #000; display: grid; place-items: center; font-weight: 900; font-size: 0.8rem;"></div>
  </header>
  
  <section id="home" class="screen active">
    <h1 style="font-size: 2rem; margin-bottom: 5px;">Hola, <span id="userName"></span></h1>
    <p style="color: var(--muted); margin-top: 0;">¿Qué necesitas arreglar hoy?</p>
    
    <div class="card" style="margin-top: 30px; border-color: var(--green);">
      <h3 style="margin-top: 0;">Explorar Categorías</h3>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div style="background: #08111f; padding: 15px; border-radius: 15px; text-align: center;">⚡ Electricidad</div>
        <div style="background: #08111f; padding: 15px; border-radius: 15px; text-align: center;">🚰 Plomería</div>
      </div>
    </div>
  </section>

  <section id="profile" class="screen">
    <h2>Mi Perfil</h2>
    <div class="card">
      <p style="margin: 0; font-weight: 700;" id="fullUserName"></p>
      <p style="margin: 5px 0 0; color: var(--muted); font-size: 0.9rem;" id="userEmail"></p>
    </div>
    <button class="btn" id="btnLogout" style="background: var(--danger); color: #fff; margin-top: 20px;">Cerrar Sesión</button>
  </section>

  <nav class="bottomNav" id="mainNav">
    <button class="navBtn active" data-screen="home">Inicio</button>
    <button class="navBtn" data-screen="search">Buscar</button>
    <button class="navBtn" data-screen="professional" style="color: var(--violet);">PRO</button>
    <button class="navBtn" data-screen="messages">Chats</button>
    <button class="navBtn" data-screen="profile">Perfil</button>
  </nav>
</main>

<script type="module">
  // Usando versión estable 10.12.2
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAngjYntHMxSz0oauk638Sl9JsKU9PitB4",
    authDomain: "servigoar.firebaseapp.com",
    projectId: "servigoar",
    storageBucket: "servigoar.firebasestorage.app",
    messagingSenderId: "104567945058",
    appId: "1:104567945058:web:f569affcc2272ec9561e3b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // Navegación
  const navButtons = document.querySelectorAll('.navBtn');
  const screens = document.querySelectorAll('.screen');

  document.getElementById('mainNav').addEventListener('click', (e) => {
    const btn = e.target.closest('.navBtn');
    if (!btn) return;
    
    screens.forEach(s => s.classList.remove('active'));
    navButtons.forEach(b => b.classList.remove('active'));
    
    document.getElementById(btn.dataset.screen).classList.add('active');
    btn.classList.add('active');
  });

  // Autenticación
  document.getElementById('btnGoogle').onclick = () => signInWithRedirect(auth, provider);
  document.getElementById('btnLogout').onclick = () => signOut(auth);

  onAuthStateChanged(auth, async (user) => {
    const login = document.getElementById('loginScreen');
    const main = document.getElementById('mainApp');

    if (user) {
      login.classList.add('hidden');
      main.classList.remove('hidden');
      
      const name = user.displayName || "Usuario";
      document.getElementById('userName').textContent = name.split(' ')[0];
      document.getElementById('fullUserName').textContent = name;
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('userIn').textContent = name[0].toUpperCase();
      
      // Sincronizar con Firestore de forma segura
      try {
        await setDoc(doc(db, "users", user.email), {
          name: name,
          email: user.email,
          photo: user.photoURL,
          lastSeen: new Date()
        }, { merge: true });
      } catch (e) {
        console.error("Error al sincronizar perfil:", e);
      }

    } else {
      login.classList.remove('hidden');
      main.classList.add('hidden');
    }
  });

  // Manejo de errores de redirección
  getRedirectResult(auth).catch((error) => {
    console.error("Error en login:", error.message);
  });
</script>
</body>
</html>
